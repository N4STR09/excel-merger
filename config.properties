# ==========================================================
# CONFIGURACION DE EXCEL MERGER
# ==========================================================
# NOTA: este fichero se lee en UTF-8, asi que puedes escribir
# acentos y caracteres especiales directamente (Ñ, á, é, etc.)
# ==========================================================

# --- Entrada y salida ---
input.directory=input
# v2.2.0: rango [min,max] de ficheros Excel aceptados en el directorio
# de entrada. Reemplaza al obsoleto input.strictTwoFiles. Min=2 porque
# el motor necesita al menos Cierre y Extraccion. Max=3 para admitir
# el fichero opcional de Deuda.
input.strictMinFiles=2
input.strictMaxFiles=3
output.file=output/resultado_fusion.xlsx
output.overwrite=true

# --- Modo de generacion (v2.3.0) ---
# Controla que hojas se generan en el libro de salida.
#
# Valores validos (estricto, minusculas, case-sensitive):
#   cierre        Comportamiento historico v2.2.0:
#                 Cierre, Extraccion, Deuda (si hay), Equipos (oculta),
#                 Resultado, Resumen.
#   responsables  Cierre, Extraccion, Equipos (oculta), Resultado,
#                 y 1 hoja vacia por cada responsable distinto que
#                 aparezca en Resultado.Res. Tecnico (trim +
#                 case-insensitive). NO genera Deuda (la copia del
#                 input se omite) ni Resumen.
#   completo      Suma de los dos: todas las hojas de 'cierre' + las
#                 hojas por responsable.
#
# Si la clave esta ausente o vacia, se asume 'cierre' por compatibilidad
# (preserva 100% el comportamiento de v2.2.0).
output.mode=responsables

# --- Modo de fusion ---
# SHEETS_SEPARATE | APPEND_ROWS
merge.mode=SHEETS_SEPARATE
merge.skipHeaderFromSecondFile=true
merge.headerRows=1
merge.resultSheetName=Datos_Fusionados
merge.copyStyles=true

# ==========================================================
# PERFILES DE FICHERO (deteccion por CONTENIDO)
# ==========================================================
# v2.0.0: los nombres internos de perfil se intercambiaron respecto a
# v1.x. Hasta 1.8.1, el perfil que contenia las peticiones internas
# del ERP se llamaba "Extraccion" y el export de Jira se llamaba
# "Cierre". Los nombres de perfil eran contraintuitivos respecto a los
# nombres habituales de los ficheros de entrada (EXCEL_CIERRE contenia
# peticiones, Extraccion_para_PDCL era el export de Jira). En 2.0.0 se
# alinean: el perfil de peticiones se llama "Cierre" y el export Jira
# se llama "Extraccion". La deteccion sigue siendo por contenido, asi
# que los ficheros de entrada pueden tener cualquier nombre.
#
# Guia de migracion desde 1.x: renombrar profile.Extraccion.* a
# profile.Cierre.* y viceversa. Las referencias cruzadas
# (mes.sourceSheet, mes.col.N.from, mes.orphans.sourceSheet) tambien
# se intercambian.

profiles=Cierre,Extraccion,Deuda

# ---- Perfil CIERRE ----
# Archivo que viene de la herramienta interna de peticiones/horas del
# ERP. Cabeceras en la fila 1. Este perfil aporta las filas base de
# la hoja Resultado (una fila por Peticion).
profile.Cierre.sheetName=Cierre
profile.Cierre.detect.headerRow=1
profile.Cierre.detect.headers=Peticion,Titulo,Aplicaci_Activi,Estado,Usuario_Resp_Tecnico,Horas_AutoriTotPeticion,Horas_RealizadoTot,Estado_Distribucion,Planificacion,Objeto_EstudioPeticion,Codigo_Facturacion,Recurso,Funcion,UltimaPrevision_Horas_Mes,Realizadas_Horas_Mes,Total_Horas_Autorizadas_Recurso,Total_Horas_Realizadas_Recurso
profile.Cierre.detect.minMatches=4
# v1.6.2: columnas a normalizar a STRING al copiar al workbook resultado.
# Necesario porque el export interno las trae como NUMERIC y el export
# de Jira las trae como STRING; si no se unifican, el SUMIFS de la
# columna Jira (criterio numerico + rango textual) no casa y deja
# fuera imputaciones validas.
# Lista CSV de cabeceras tal y como aparecen en 'detect.headers'.
# v1.8.1: Usuario_Resp_Tecnico se anade para poderlo trimar (ver trim.columns).
profile.Cierre.asText.columns=Peticion,Recurso,Usuario_Resp_Tecnico

# v1.8.1: columnas cuyo valor se trim()a tras el cast a STRING. Motivo:
# algunos exports ERP alinean los codigos de texto con padding de espacios
# ("MG002   "), que rompe el SUMIFS (case-insensitive pero NO
# trim-insensitive). El trim se aplica en la capa de copia, asi que
# cualquier hoja aguas abajo (Resultado, Resumen) consume ya valores
# limpios. Solo tiene efecto para columnas que tambien esten en
# asText.columns.
profile.Cierre.trim.columns=Recurso,Usuario_Resp_Tecnico

# ---- Perfil EXTRACCION ----
# Export de Jira con las imputaciones/horas. Las cabeceras estan en
# la fila 2 (la 1 suele ser titulo/metadatos). Este perfil se usa en
# el SUMIFS de la columna Jira de Resultado para sumar horas por
# Peticion/Recurso/Funcion.
profile.Extraccion.sheetName=Extraccion
profile.Extraccion.detect.headerRow=2
profile.Extraccion.detect.headers=Project Key,Issue Key,Aplicación BFA,Labels,Parent Issue Summary,Summary,Description,Issue Type,Time entry: User,Time entry: Date,Component Name,Time entry: Description,Matricula,Funcion,Account,Hours
profile.Extraccion.detect.minMatches=4
# v1.6.2: vease comentario en Cierre.asText.columns. Simetrico: aunque
# el export de Jira suele venir ya textual, forzarlo aqui es barato y
# blinda frente a futuros exports donde alguna columna vuelva a NUMERIC.
profile.Extraccion.asText.columns=Component Name,Matricula

# v1.8.1: trim defensivo de la Matricula por simetria con el perfil
# Cierre. En exports normales de Jira no trae padding, pero protege
# frente a cambios futuros del formato de export.
profile.Extraccion.trim.columns=Matricula

# ---- Perfil DEUDA (v2.2.0) ----
# Fichero OPCIONAL que aporta horas de deuda por (Peticion, Matricula,
# Funcion). Cuando esta presente, la columna "PDCL + Deuda" de la hoja
# Resultado suma las horas cruzadas con esta hoja. Cuando no, la columna
# "PDCL + Deuda" es identica a "PDCL" (comportamiento v2.1.0).
#
# Cabeceras minimas: las 4 listadas, todas en la fila 1. Si sobran
# columnas en el Excel de entrada, se copian igualmente al workbook
# resultado (copia completa).
#
# La clave de cruce con Resultado es:
#   Deuda.Peticion  <->  Resultado.Petición
#   Deuda.Matricula <->  Resultado.Matrícula
#   Deuda.Funcion   <->  Resultado.Funcion   (misma columna: el "rol"
#                                             Dev/Sup/... ; NO confundir
#                                             con Resultado.Res. Tecnico,
#                                             que es el nombre del
#                                             responsable).
profile.Deuda.sheetName=Deuda
profile.Deuda.detect.headerRow=1
profile.Deuda.detect.headers=Peticion,Matricula,Funcion,Horas
profile.Deuda.detect.minMatches=4

# Normalizacion: mismo tratamiento que Cierre/Extraccion para evitar
# mismatch numerico/textual en el SUMIFS (leccion v1.7.1). Funcion no
# se incluye por defecto; si el Excel de Deuda llega con "DEV  " con
# espacios, anade Funcion a ambas listas.
profile.Deuda.asText.columns=Peticion,Matricula
profile.Deuda.trim.columns=Matricula

# ==========================================================
# HOJA "Resultado"
# ==========================================================
# Estructura FIJA de 17 columnas. Cada columna tiene un "type":
#   COPY    -> copia directa de una columna de la hoja origen
#   SUMIFS  -> formula de suma condicional cruzando con otra hoja
#   EMPTY   -> celda vacia (placeholder, a la espera de su formula)
#
# La "columna ancla" determina cuantas filas tendra Resultado: una fila
# por cada fila de la hoja origen que tenga valor en esa columna.
# ==========================================================

mes.enabled=true
mes.sheetName=Resultado
# v2.0.0: tras el swap, la hoja que contiene las peticiones del ERP se
# llama Cierre (antes se llamaba Extraccion). Es la hoja de la que
# MesSheetBuilder lee una fila por cada Peticion no vacia.
mes.sourceSheet=Cierre
mes.sourceHeaderRow=1
mes.anchorColumn=Peticion

# --- 15 columnas de Resultado ---
# v2.1.0: nueva columna Funcion en posicion 7 (tras Matricula). COPY desde
# la columna Funcion de la hoja Cierre. Los indices 7..14 previos se
# desplazan a 8..15.
mes.col.1.name=Petición
mes.col.1.type=COPY
mes.col.1.from=Peticion

mes.col.2.name=Aplicación
mes.col.2.type=COPY
mes.col.2.from=Aplicaci_Activi

mes.col.3.name=Equipo
mes.col.3.type=FORMULA
mes.col.3.formula=IFERROR(VLOOKUP({col:Aplicación},Equipos!$A:$B,2,FALSE),"")

mes.col.4.name=Título
mes.col.4.type=COPY
mes.col.4.from=Titulo

mes.col.5.name=Departamento
mes.col.5.type=COPY
mes.col.5.from=Codigo_Facturacion

mes.col.6.name=Matrícula
mes.col.6.type=COPY
mes.col.6.from=Recurso

# v2.1.0: Funcion (AN, DI, PR, OT, IN, RE, SC, TE, ...) copiada desde
# Cierre. Si el valor original es "-", se copia tal cual. Una matricula
# puede aparecer en varias filas de Resultado con distintas funciones:
# cada peticion (Cierre.Peticion + Cierre.Recurso + Cierre.Funcion) es su
# propia fila, y asi queda reflejado aqui.
mes.col.7.name=Funcion
mes.col.7.type=COPY
mes.col.7.from=Funcion

mes.col.8.name=Estado
mes.col.8.type=COPY
mes.col.8.from=Estado

mes.col.9.name=Res. Tecnico
mes.col.9.type=COPY
mes.col.9.from=Usuario_Resp_Tecnico

mes.col.10.name=Jira
mes.col.10.type=SUMIFS
# v2.0.0: la hoja con las imputaciones de Jira (Component Name, Matricula,
# Hours) se llama ahora "Extraccion" (antes "Cierre").
mes.col.10.from=Extraccion
mes.col.10.sum=Hours
mes.col.10.match=Component Name:Peticion,Matricula:Recurso,Funcion:Funcion

mes.col.11.name=REAL
mes.col.11.type=FORMULA
mes.col.11.formula={col:Jira}*1.2

mes.col.12.name=PDCL
mes.col.12.type=FORMULA
mes.col.12.formula={col:Jira}*1.2
mes.col.12.fill=LIGHT_GREEN

mes.col.13.name=PDCL + Deuda
# v2.2.0: tipo nuevo FORMULA_PLUS_SUMIFS. Comportamiento:
#   - Si la hoja 'Deuda' existe (porque el usuario aporto el tercer
#     fichero), la formula es: {col:PDCL}+IFERROR(SUMIFS(...),0)
#   - Si la hoja 'Deuda' NO existe, la formula es: {col:PDCL}
#     (identica a v2.1.0, degradado silencioso sin warning).
# Las letras de columna de la hoja Deuda se resuelven en runtime
# leyendo la cabecera, igual que mes.col.10 (Jira). No asume orden
# fijo A/B/C/D.
# Cruce: Deuda.Peticion  <-> Resultado.Petición,
#        Deuda.Matricula <-> Resultado.Matrícula,
#        Deuda.Funcion   <-> Resultado.Funcion (el "rol" Dev/Sup/...;
#        NO Resultado.Res. Tecnico, que es el responsable-persona).
mes.col.13.type=FORMULA_PLUS_SUMIFS
mes.col.13.baseFormula={col:PDCL}
mes.col.13.from=Deuda
mes.col.13.sum=Horas
mes.col.13.match=Peticion:Petición,Matricula:Matrícula,Funcion:Funcion
mes.col.13.fill=MEDIUM_GREEN
mes.col.13.redIfNotEqualTo=PDCL

mes.col.14.name=Horas_RealizadoTot
mes.col.14.type=COPY
mes.col.14.from=Horas_RealizadoTot

mes.col.15.name=Realizadas_Horas_Mes
mes.col.15.type=COPY
mes.col.15.from=Realizadas_Horas_Mes

# ==========================================================
# HOJAS DE LOOKUP (tablas de mapeo para VLOOKUP)
# ==========================================================
# Cada hoja que liste aqui se crea en el Excel resultado con dos
# columnas (clave y valor). Las formulas de MES pueden consultarla
# con VLOOKUP.
#
# Formato de data: key1:value1, key2:value2, key3:value3
# La barra '\' al final permite continuar la propiedad en varias
# lineas (son todas la MISMA propiedad).
# ==========================================================

lookup.sheets=Equipos

lookup.Equipos.header1=App
lookup.Equipos.header2=Equipo
lookup.Equipos.hidden=true
lookup.Equipos.data=\
  DF:Iker,\
  HE:Jon,\
  EW:JAVA,\
  HW:Argia,\
  J6:Iker,\
  JX:JAVA,\
  NO:Personal,\
  PE:Personal,\
  PF:Jon,\
  PG:ZEREGIN,\
  WH:Iker,\
  RA:FP,\
  FO:Iker,\
  HI:ARGIA,\
  PM:JAVA,\
  SP:Selección,\
  PO:Personal,\
  1D:Personal,\
  PL:Personal,\
  KE:Argia,\
  AI:Personal,\
  TF:Personal,\
  PN:Personal,\
  P5:Personal,\
  RG:Personal,\
  JL:Iker,\
  DC:Personal,\
  TE:T0,\
  T5:T0,\
  KP:Argia,\
  RY:Iker,\
  UT:Jon,\
  VL:JON,\
  O6:Jon

# ==========================================================
# HOJAS ADICIONALES (opcional)
# ==========================================================
derived.sheets=

# ==========================================================
# ROBUSTEZ Y UX (v1.2.0)
# ==========================================================

# --- Backup del archivo de salida ---
# Si true y el archivo de salida ya existe, se mueve antes de sobreescribirlo a:
#   <carpeta del output>/history/<nombre>_yyyy-MM-dd_HHmmss.xlsx
# (se crea la carpeta 'history' si no existe).
# Si false, simplemente se sobreescribe (controlado por output.overwrite).
output.backup=false

# --- Validacion estricta del config ---
# Si true (por defecto), antes de tocar ningun Excel se ejecuta una
# validacion completa del config. Cualquier error aborta la ejecucion
# con codigo de salida 2.
# Si false, los errores se registran como warnings en el resumen final
# y la ejecucion continua (con el comportamiento antiguo de
# "degradar en silencio" columnas mal configuradas).
config.strictValidation=true

# ==========================================================
# REPORTE EN EL EXCEL
# ==========================================================
# Si true, al final del merge se anade una hoja extra con todos
# los warnings acumulados (apps sin mapeo, cabeceras no encontradas,
# perfiles sin match, etc.). Util para revisar el resultado sin
# tener que abrir el log. Si no hay warnings, la hoja no se crea.
# Default: false (opt-in explicito).
report.inExcel=false

# Nombre de la hoja de avisos (default: _Avisos).
report.sheetName=_Avisos

# Si true (default), la hoja de avisos se crea oculta. Sigue
# siendo visible en Excel con 'Boton derecho sobre pestana
# > Mostrar...'.
report.hidden=true

# ==========================================================
# HOJA "Resumen" (v1.6.0)
# ==========================================================
# Sumatorio por matricula de las columnas numericas de la hoja
# Resultado (Jira, REAL, PDCL, PDCL + Deuda por defecto).
#
# Layout generado:
#   Fila 1: titulo "Resumen por <Matrícula>" (merge sobre el ancho).
#   Fila 3: cabeceras (clave + columnas de valor).
#   Filas 4..N: una por matricula detectada, con SUMIFS sobre Resultado.
#   Fila N+1: totales (SUM) por columna.
#
# Las matriculas se auto-descubren desde la hoja Resultado (todas las
# no vacias: numericas + "-", "Sin Matricula", etc.).
# ==========================================================

# Habilita/deshabilita la hoja. Default false (opt-in).
summary.enabled=true

# Nombre de la hoja en el libro de salida.
summary.sheetName=Resumen

# Hoja que contiene los datos a sumar. Por convencion, la misma
# que mes.sheetName (la genera MesSheetBuilder).
summary.sumSheet=Resultado

# Nombre de la columna clave (matricula) en summary.sumSheet.
# Debe coincidir con alguno de los mes.col.N.name.
summary.matriculaColumn=Matrícula

# Lista de columnas (separadas por coma) cuyos valores se sumaran por
# matricula. Los nombres deben coincidir exactamente con mes.col.N.name.
# Se omiten silenciosamente las que no se encuentren, registrando un
# warning en el reporte.
summary.valueColumns=Jira,REAL,PDCL,PDCL + Deuda

# Tope superior de los rangos de los SUMIFS. En el original se usa I:I
# (columna completa); aqui se acota para que POI pueda evaluar las
# formulas en los tests de integracion.
summary.sumifsMaxRow=10000

# ==========================================================
# HOJA "Resumen" — Segunda tabla (v1.8.0)
# ==========================================================
# Tabla matriz que cruza Matricula (filas) x Res. Tecnico (columnas),
# sumando una sola columna de valor (PDCL por defecto). Se anade a
# la misma hoja Resumen, debajo de la tabla principal, separada por
# un numero configurable de filas en blanco.
#
# Es opt-in: si summary.byResponsible.enabled no esta o es false,
# la tabla no se genera y Resumen queda como en v1.7.1.
#
# Normalizacion de responsables: los codigos se agrupan por su forma
# en MAYUSCULAS tras trim(). Las variantes "resp01" / "RESP01" /
# " Resp01 " cuentan como un unico responsable (RESP01). El SUMIFS
# de Excel es case-insensitive en texto, asi que la suma es correcta
# independientemente de como venga el Excel original.
# ==========================================================

# Habilita/deshabilita la segunda tabla. Default false (opt-in).
summary.byResponsible.enabled=true

# Columna de Resultado que agrupa en columnas (responsables).
# Por defecto coincide con mes.col.8.name.
summary.byResponsible.column=Res. Tecnico

# Columna de valor a sumar (una sola). Debe coincidir con un
# mes.col.N.name de Resultado. Por defecto PDCL.
summary.byResponsible.valueColumn=PDCL

# Titulo visible de la tabla (fila de cabecera merge).
summary.byResponsible.title=Totales Peticiones por Responsables Matrículas

# Numero de filas en blanco entre la tabla de matriculas y esta.
# Admite 0 (tablas pegadas). Default 2.
summary.byResponsible.gapRows=2

# ==========================================================
# HOJAS DE RESPONSABLE — Tablas pivot (v2.4.0)
# ==========================================================
# En los modos output.mode=responsables y output.mode=completo, ademas
# de la cabecera A1, cada hoja de responsable contiene dos tablas pivot
# Peticion x Matricula apiladas verticalmente:
#
#   1) Horas imputadas (Jira) por Peticion x Matricula.
#   2) REAL por Peticion x Matricula.
#
# Ambas son SUMIFS vivos contra Resultado, filtrados por el responsable
# cuyo nombre figura en A1 de la hoja. Las peticiones y matriculas que
# aparecen son unicamente las que ese responsable tiene en Resultado
# (no todas las del libro). Los rangos SUMIFS se acotan con
# summary.sumifsMaxRow (compartido con la hoja Resumen) para que POI
# pueda evaluarlos en los tests de integracion.
#
# Es opt-out: si responsables.tables.enabled no esta o es true, las
# tablas se generan. Si es false, las hojas quedan como en v2.3.0
# (solo cabecera A1).
#
# En modo output.mode=cierre, esta seccion no aplica (no se generan
# hojas de responsable).
# ==========================================================

# Habilita/deshabilita las tablas pivot en hojas de responsable.
# Default true (la feature se incorpora con la version 2.4.0; un upgrade
# del binario sin tocar el config aporta la funcionalidad nueva).
responsables.tables.enabled=true

# Titulo de la primera tabla (Jira). Utilizado como literal en la fila
# merged. Cambialo si quieres otro encabezado en el Excel.
responsables.tables.jiraTitle=Horas imputadas (Jira) por Petición × Matrícula

# Titulo de la segunda tabla (REAL). Mismo criterio que arriba.
responsables.tables.realTitle=REAL por Petición × Matrícula

# Filas en blanco entre las dos tablas. Admite 0 (pegadas). Default 2.
responsables.tables.gapRows=2

# ==========================================================
# HUERFANOS (v1.7.0)
# ==========================================================
# Si true, las imputaciones del export de Jira cuya
# (Component Name, Matricula) no tiene fila equivalente en
# Cierre.(Peticion, Recurso) se incluyen en Resultado como filas
# adicionales. Una fila por cada pareja (CN, Mat) con las horas totales
# sumadas en la columna Jira. REAL/PDCL/PDCL+Deuda se calculan con sus
# formulas habituales (*1.2 sobre Jira). El resto de columnas (Titulo,
# Estado, etc.) se rellenan con un literal "-".
#
# Cuando se activa, Resultado se ordena: peticiones numericas ascendente
# primero, no numericas al final en orden alfabetico. Esto tambien afecta
# al orden de las filas normales (que hasta ahora heredaban el orden de
# la hoja origen del perfil Cierre).
#
# Default: false (comportamiento v1.6.2 intacto).
mes.orphans.enabled=true

# Hoja de la que extraer las imputaciones huerfanas.
# v2.0.0: el export de Jira con las imputaciones se llama ahora
# "Extraccion" (antes "Cierre").
mes.orphans.sourceSheet=Extraccion

# Columna de Extraccion usada como clave "Component Name" (cruza con
# Peticion de Cierre).
mes.orphans.matchComponent=Component Name

# Columna de Extraccion usada como clave "Matricula" (cruza con Recurso
# de Cierre).
mes.orphans.matchMatricula=Matricula

# Columna de Extraccion cuyo valor se agrega en Jira para cada pareja huerfana.
mes.orphans.sumColumn=Hours

# Nombres de las columnas MES que reciben, respectivamente, el Component
# Name, la Matricula y las horas totales del huerfano. Deben coincidir
# exactamente con los mes.col.N.name configurados. Solo cambia esto si
# has renombrado esas columnas en mes.col.*.
mes.orphans.colPeticion=Petición
mes.orphans.colMatricula=Matrícula
mes.orphans.colJira=Jira
