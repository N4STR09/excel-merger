# ==========================================================
# CONFIGURACION DE EXCEL MERGER
# ==========================================================
# NOTA: este fichero se lee en UTF-8, asi que puedes escribir
# acentos y caracteres especiales directamente (Ñ, á, é, etc.)
# ==========================================================

# --- Entrada y salida ---
input.directory=input
input.strictTwoFiles=true
output.file=output/resultado_fusion.xlsx
output.overwrite=true

# --- Modo de fusion ---
# SHEETS_SEPARATE | APPEND_ROWS
merge.mode=SHEETS_SEPARATE
merge.skipHeaderFromSecondFile=true
merge.headerRows=1
merge.resultSheetName=Datos_Fusionados
merge.copyStyles=true

# ==========================================================
# PERFILES DE FICHERO (deteccion por CONTENIDO)
# ==========================================================

profiles=Extraccion,Cierre

# ---- Perfil EXTRACCION ----
# Archivo que viene de la herramienta interna de peticiones/horas.
# Las cabeceras estan en la fila 1.
profile.Extraccion.sheetName=Extraccion
profile.Extraccion.detect.headerRow=1
profile.Extraccion.detect.headers=Peticion,Titulo,Aplicaci_Activi,Estado,Usuario_Resp_Tecnico,Horas_AutoriTotPeticion,Horas_RealizadoTot,Estado_Distribucion,Planificacion,Objeto_EstudioPeticion,Codigo_Facturacion,Recurso,Funcion,UltimaPrevision_Horas_Mes,Realizadas_Horas_Mes,Total_Horas_Autorizadas_Recurso,Total_Horas_Realizadas_Recurso
profile.Extraccion.detect.minMatches=4
# v1.6.2: columnas a normalizar a STRING al copiar al workbook resultado.
# Necesario porque el export interno las trae como NUMERIC y Cierre las trae
# como STRING; si no se unifican, el SUMIFS de la columna Jira (criterio
# numerico + rango textual) no casa y deja fuera imputaciones validas.
# Lista CSV de cabeceras tal y como aparecen en 'detect.headers'.
profile.Extraccion.asText.columns=Peticion,Recurso

# ---- Perfil CIERRE ----
# Export de Jira. Las cabeceras estan en la fila 2 (la 1 suele ser titulo/metadatos).
profile.Cierre.sheetName=Cierre
profile.Cierre.detect.headerRow=2
profile.Cierre.detect.headers=Project Key,Issue Key,Aplicación BFA,Labels,Parent Issue Summary,Summary,Description,Issue Type,Time entry: User,Time entry: Date,Component Name,Time entry: Description,Matricula,Funcion,Account,Hours
profile.Cierre.detect.minMatches=4
# v1.6.2: vease comentario en Extraccion.asText.columns. Simetrico: aunque
# Cierre suele venir ya textual, forzarlo aqui es barato y blinda frente a
# futuros exports donde alguna de estas columnas vuelva a ser numerica.
profile.Cierre.asText.columns=Component Name,Matricula

# ==========================================================
# HOJA "Resultado"
# ==========================================================
# Estructura FIJA de 17 columnas. Cada columna tiene un "type":
#   COPY    -> copia directa de una columna de la hoja origen
#   SUMIFS  -> formula de suma condicional cruzando con otra hoja
#   EMPTY   -> celda vacia (placeholder, a la espera de su formula)
#
# La "columna ancla" determina cuantas filas tendra Resultado: una fila
# por cada fila de la hoja origen que tenga valor en esa columna.
# ==========================================================

mes.enabled=true
mes.sheetName=Resultado
mes.sourceSheet=Extraccion
mes.sourceHeaderRow=1
mes.anchorColumn=Peticion

# --- 14 columnas de Resultado ---
mes.col.1.name=Petición
mes.col.1.type=COPY
mes.col.1.from=Peticion

mes.col.2.name=Aplicación
mes.col.2.type=COPY
mes.col.2.from=Aplicaci_Activi

mes.col.3.name=Equipo
mes.col.3.type=FORMULA
mes.col.3.formula=IFERROR(VLOOKUP({col:Aplicación},Equipos!$A:$B,2,FALSE),"")

mes.col.4.name=Título
mes.col.4.type=COPY
mes.col.4.from=Titulo

mes.col.5.name=Departamento
mes.col.5.type=COPY
mes.col.5.from=Codigo_Facturacion

mes.col.6.name=Matrícula
mes.col.6.type=COPY
mes.col.6.from=Recurso

mes.col.7.name=Estado
mes.col.7.type=COPY
mes.col.7.from=Estado

mes.col.8.name=Res. Tecnico
mes.col.8.type=COPY
mes.col.8.from=Usuario_Resp_Tecnico

mes.col.9.name=Jira
mes.col.9.type=SUMIFS
mes.col.9.from=Cierre
mes.col.9.sum=Hours
mes.col.9.match=Component Name:Peticion,Matricula:Recurso,Funcion:Funcion

mes.col.10.name=REAL
mes.col.10.type=FORMULA
mes.col.10.formula={col:Jira}*1.2

mes.col.11.name=PDCL
mes.col.11.type=FORMULA
mes.col.11.formula={col:Jira}*1.2
mes.col.11.fill=LIGHT_GREEN

mes.col.12.name=PDCL + Deuda
mes.col.12.type=FORMULA
mes.col.12.formula={col:PDCL}
mes.col.12.fill=MEDIUM_GREEN
mes.col.12.redIfNotEqualTo=PDCL

mes.col.13.name=Horas_RealizadoTot
mes.col.13.type=COPY
mes.col.13.from=Horas_RealizadoTot

mes.col.14.name=Realizadas_Horas_Mes
mes.col.14.type=COPY
mes.col.14.from=Realizadas_Horas_Mes

# ==========================================================
# HOJAS DE LOOKUP (tablas de mapeo para VLOOKUP)
# ==========================================================
# Cada hoja que liste aqui se crea en el Excel resultado con dos
# columnas (clave y valor). Las formulas de MES pueden consultarla
# con VLOOKUP.
#
# Formato de data: key1:value1, key2:value2, key3:value3
# La barra '\' al final permite continuar la propiedad en varias
# lineas (son todas la MISMA propiedad).
# ==========================================================

lookup.sheets=Equipos

lookup.Equipos.header1=App
lookup.Equipos.header2=Equipo
lookup.Equipos.hidden=true
lookup.Equipos.data=\
