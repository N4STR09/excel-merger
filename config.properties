# ==========================================================
# CONFIGURACION DE EXCEL MERGER
# ==========================================================
# NOTA: este fichero se lee en UTF-8, asi que puedes escribir
# acentos y caracteres especiales directamente (Ñ, á, é, etc.)
# ==========================================================

# --- Entrada y salida ---
input.directory=input
input.strictTwoFiles=true
output.file=output/resultado_fusion.xlsx
output.overwrite=true

# --- Modo de fusion ---
# SHEETS_SEPARATE | APPEND_ROWS
merge.mode=SHEETS_SEPARATE
merge.skipHeaderFromSecondFile=true
merge.headerRows=1
merge.resultSheetName=Datos_Fusionados
merge.copyStyles=true

# ==========================================================
# PERFILES DE FICHERO (deteccion por CONTENIDO)
# ==========================================================

profiles=Extraccion,Cierre

# ---- Perfil EXTRACCION ----
# Archivo que viene de la herramienta interna de peticiones/horas.
# Las cabeceras estan en la fila 1.
profile.Extraccion.sheetName=Extraccion
profile.Extraccion.detect.headerRow=1
profile.Extraccion.detect.headers=Peticion,Titulo,Aplicaci_Activi,Estado,Usuario_Resp_Tecnico,Horas_AutoriTotPeticion,Horas_RealizadoTot,Estado_Distribucion,Planificacion,Objeto_EstudioPeticion,Codigo_Facturacion,Recurso,Funcion,UltimaPrevision_Horas_Mes,Realizadas_Horas_Mes,Total_Horas_Autorizadas_Recurso,Total_Horas_Realizadas_Recurso
profile.Extraccion.detect.minMatches=4

# ---- Perfil CIERRE ----
# Export de Jira. Las cabeceras estan en la fila 2 (la 1 suele ser titulo/metadatos).
profile.Cierre.sheetName=Cierre
profile.Cierre.detect.headerRow=2
profile.Cierre.detect.headers=Project Key,Issue Key,Aplicación BFA,Labels,Parent Issue Summary,Summary,Description,Issue Type,Time entry: User,Time entry: Date,Component Name,Time entry: Description,Matricula,Funcion,Account,Hours
profile.Cierre.detect.minMatches=4

# ==========================================================
# HOJA "Resultado"
# ==========================================================
# Estructura FIJA de 17 columnas. Cada columna tiene un "type":
#   COPY    -> copia directa de una columna de la hoja origen
#   SUMIFS  -> formula de suma condicional cruzando con otra hoja
#   EMPTY   -> celda vacia (placeholder, a la espera de su formula)
#
# La "columna ancla" determina cuantas filas tendra Resultado: una fila
# por cada fila de la hoja origen que tenga valor en esa columna.
# ==========================================================

mes.enabled=true
mes.sheetName=Resultado
mes.sourceSheet=Extraccion
mes.sourceHeaderRow=1
mes.anchorColumn=Peticion

# --- 14 columnas de Resultado ---
mes.col.1.name=Petición
mes.col.1.type=COPY
mes.col.1.from=Peticion

mes.col.2.name=Aplicación
mes.col.2.type=COPY
mes.col.2.from=Aplicaci_Activi

mes.col.3.name=Equipo
mes.col.3.type=FORMULA
mes.col.3.formula=IFERROR(VLOOKUP({col:Aplicación},Equipos!$A:$B,2,FALSE),"")

mes.col.4.name=Título
mes.col.4.type=COPY
mes.col.4.from=Titulo

mes.col.5.name=Departamento
mes.col.5.type=COPY
mes.col.5.from=Codigo_Facturacion

mes.col.6.name=Matrícula
mes.col.6.type=COPY
mes.col.6.from=Recurso

mes.col.7.name=Estado
mes.col.7.type=COPY
mes.col.7.from=Estado

mes.col.8.name=Res. Tecnico
mes.col.8.type=COPY
mes.col.8.from=Usuario_Resp_Tecnico

mes.col.9.name=Jira
mes.col.9.type=SUMIFS
mes.col.9.from=Cierre
mes.col.9.sum=Hours
mes.col.9.match=Component Name:Peticion,Matricula:Recurso,Funcion:Funcion

mes.col.10.name=REAL
mes.col.10.type=FORMULA
mes.col.10.formula={col:Jira}*1.2

mes.col.11.name=PDCL
mes.col.11.type=FORMULA
mes.col.11.formula={col:Jira}*1.2

mes.col.12.name=PDCL + Deuda
mes.col.12.type=FORMULA
mes.col.12.formula={col:PDCL}

mes.col.13.name=Desfase
mes.col.13.type=FORMULA
mes.col.13.formula={col:PDCL}-{col:REAL}
mes.col.13.greenIfPositive=true

mes.col.14.name=Dif Mes
mes.col.14.type=EMPTY
mes.col.14.greenIfPositive=true

mes.col.15.name=Horas_RealizadoTot
mes.col.15.type=COPY
mes.col.15.from=Horas_RealizadoTot

mes.col.16.name=Realizadas_Horas_Mes
mes.col.16.type=COPY
mes.col.16.from=Realizadas_Horas_Mes

# ==========================================================
# HOJAS DE LOOKUP (tablas de mapeo para VLOOKUP)
# ==========================================================
# Cada hoja que liste aqui se crea en el Excel resultado con dos
# columnas (clave y valor). Las formulas de MES pueden consultarla
# con VLOOKUP.
#
# Formato de data: key1:value1, key2:value2, key3:value3
# La barra '\' al final permite continuar la propiedad en varias
# lineas (son todas la MISMA propiedad).
# ==========================================================

lookup.sheets=Equipos

lookup.Equipos.header1=App
lookup.Equipos.header2=Equipo
lookup.Equipos.hidden=true
lookup.Equipos.data=\
  DF:Iker,\
  HE:Jon,\
  EW:JAVA,\
  HW:Argia,\
  J6:Iker,\
  JX:JAVA,\
  NO:Personal,\
  PE:Personal,\
  PF:Jon,\
  PG:ZEREGIN,\
  WH:Iker,\
  RA:FP,\
  FO:Iker,\
  HI:ARGIA,\
  PM:JAVA,\
  SP:Selección,\
  PO:Personal,\
  1D:Personal,\
  PL:Personal,\
  KE:Argia,\
  AI:Personal,\
  TF:Personal,\
  PN:Personal,\
  P5:Personal,\
  RG:Personal,\
  JL:Iker,\
  DC:Personal,\
  TE:T0,\
  T5:T0,\
  KP:Argia,\
  RY:Iker,\
  UT:Jon,\
  VL:JON,\
  O6:Jon

# ==========================================================
# HOJAS ADICIONALES (opcional)
# ==========================================================
derived.sheets=

# ==========================================================
# ROBUSTEZ Y UX (v1.2.0)
# ==========================================================

# --- Backup del archivo de salida ---
# Si true y el archivo de salida ya existe, se mueve antes de sobreescribirlo a:
#   <carpeta del output>/history/<nombre>_yyyy-MM-dd_HHmmss.xlsx
# (se crea la carpeta 'history' si no existe).
# Si false, simplemente se sobreescribe (controlado por output.overwrite).
output.backup=false

# --- Validacion estricta del config ---
# Si true (por defecto), antes de tocar ningun Excel se ejecuta una
# validacion completa del config. Cualquier error aborta la ejecucion
# con codigo de salida 2.
# Si false, los errores se registran como warnings en el resumen final
# y la ejecucion continua (con el comportamiento antiguo de
# "degradar en silencio" columnas mal configuradas).
config.strictValidation=true

# ==========================================================
# REPORTE EN EL EXCEL
# ==========================================================
# Si true, al final del merge se anade una hoja extra con todos
# los warnings acumulados (apps sin mapeo, cabeceras no encontradas,
# perfiles sin match, etc.). Util para revisar el resultado sin
# tener que abrir el log. Si no hay warnings, la hoja no se crea.
# Default: false (opt-in explicito).
report.inExcel=false

# Nombre de la hoja de avisos (default: _Avisos).
report.sheetName=_Avisos

# Si true (default), la hoja de avisos se crea oculta. Sigue
# siendo visible en Excel con 'Boton derecho sobre pestana
# > Mostrar...'.
report.hidden=true

# ==========================================================
# HOJA "Resumen" (v1.6.0)
# ==========================================================
# Sumatorio por matricula de las columnas numericas de la hoja
# Resultado (Jira, REAL, PDCL, PDCL + Deuda por defecto).
#
# Layout generado:
#   Fila 1: titulo "Resumen por <Matrícula>" (merge sobre el ancho).
#   Fila 3: cabeceras (clave + columnas de valor).
#   Filas 4..N: una por matricula detectada, con SUMIFS sobre Resultado.
#   Fila N+1: totales (SUM) por columna.
#
# Las matriculas se auto-descubren desde la hoja Resultado (todas las
# no vacias: numericas + "-", "Sin Matricula", etc.).
# ==========================================================

# Habilita/deshabilita la hoja. Default false (opt-in).
summary.enabled=true

# Nombre de la hoja en el libro de salida.
summary.sheetName=Resumen

# Hoja que contiene los datos a sumar. Por convencion, la misma
# que mes.sheetName (la genera MesSheetBuilder).
summary.sumSheet=Resultado

# Nombre de la columna clave (matricula) en summary.sumSheet.
# Debe coincidir con alguno de los mes.col.N.name.
summary.matriculaColumn=Matrícula

# Lista de columnas (separadas por coma) cuyos valores se sumaran por
# matricula. Los nombres deben coincidir exactamente con mes.col.N.name.
# Se omiten silenciosamente las que no se encuentren, registrando un
# warning en el reporte.
summary.valueColumns=Jira,REAL,PDCL,PDCL + Deuda

# Tope superior de los rangos de los SUMIFS. En el original se usa I:I
# (columna completa); aqui se acota para que POI pueda evaluar las
# formulas en los tests de integracion.
summary.sumifsMaxRow=10000
