# ==========================================================
# CONFIGURACION DE TESTS
# ==========================================================
# Los placeholders ${TEST_INPUT_DIR} y ${TEST_OUTPUT_FILE} los
# sustituye TestFixtures.renderTestConfig() en tiempo de ejecucion
# con rutas derivadas del @TempDir de cada test.
# ==========================================================

input.directory=${TEST_INPUT_DIR}
# v2.2.0: ver notas en config.properties principal.
input.strictMinFiles=2
input.strictMaxFiles=3
output.file=${TEST_OUTPUT_FILE}
output.overwrite=true
output.backup=false

merge.mode=SHEETS_SEPARATE
merge.skipHeaderFromSecondFile=true
merge.headerRows=1
merge.resultSheetName=Datos_Fusionados
merge.copyStyles=false

# --- Perfiles ---
# v2.0.0: nombres intercambiados respecto a 1.x. Cierre = peticiones ERP
# (antes Extraccion); Extraccion = export de Jira (antes Cierre).
# v2.2.0: Deuda opcional.
profiles=Cierre,Extraccion,Deuda

profile.Cierre.sheetName=Cierre
profile.Cierre.detect.headerRow=1
profile.Cierre.detect.headers=Peticion,Titulo,Aplicaci_Activi,Estado,Usuario_Resp_Tecnico
profile.Cierre.detect.minMatches=4
# v1.6.2: normaliza Peticion y Recurso a STRING para evitar mismatch
# numerico/textual contra el export de Jira.
profile.Cierre.asText.columns=Peticion,Recurso,Usuario_Resp_Tecnico
profile.Cierre.trim.columns=Recurso,Usuario_Resp_Tecnico

profile.Extraccion.sheetName=Extraccion
profile.Extraccion.detect.headerRow=2
profile.Extraccion.detect.headers=Project Key,Issue Key,Component Name,Matricula,Hours
profile.Extraccion.detect.minMatches=4
# v1.6.2: simetrico al perfil Cierre; blinda frente a exports donde
# Component Name o Matricula vinieran como numero.
profile.Extraccion.asText.columns=Component Name,Matricula

# v2.2.0: perfil Deuda opcional.
profile.Deuda.sheetName=Deuda
profile.Deuda.detect.headerRow=1
profile.Deuda.detect.headers=Peticion,Matricula,Funcion,Horas
profile.Deuda.detect.minMatches=4
profile.Deuda.asText.columns=Peticion,Matricula
profile.Deuda.trim.columns=Matricula

# --- Hoja MES ---
mes.enabled=true
mes.sheetName=Resultado
mes.sourceSheet=Cierre
mes.sourceHeaderRow=1
mes.anchorColumn=Peticion

mes.col.1.name=Petición
mes.col.1.type=COPY
mes.col.1.from=Peticion

mes.col.2.name=Aplicación
mes.col.2.type=COPY
mes.col.2.from=Aplicaci_Activi

mes.col.3.name=Equipo
mes.col.3.type=FORMULA
mes.col.3.formula=IFERROR(VLOOKUP({col:Aplicación},Equipos!$A:$B,2,FALSE),"")

mes.col.4.name=Jira
mes.col.4.type=SUMIFS
mes.col.4.from=Extraccion
mes.col.4.sum=Hours
mes.col.4.match=Component Name:Peticion,Matricula:Recurso,Funcion:Funcion

mes.col.5.name=REAL
mes.col.5.type=FORMULA
mes.col.5.formula={col:Jira}*1.2

mes.col.6.name=Matrícula
mes.col.6.type=COPY
mes.col.6.from=Recurso

# v2.1.0: Funcion copiada desde Cierre, tras Matricula.
mes.col.7.name=Funcion
mes.col.7.type=COPY
mes.col.7.from=Funcion

mes.col.8.name=Res. Tecnico
mes.col.8.type=COPY
mes.col.8.from=Usuario_Resp_Tecnico

mes.col.9.name=PDCL
mes.col.9.type=FORMULA
mes.col.9.formula={col:Jira}*1.2
mes.col.9.fill=LIGHT_GREEN

mes.col.10.name=PDCL + Deuda
# v2.2.0: tipo nuevo con degradado silencioso si la hoja Deuda no existe.
mes.col.10.type=FORMULA_PLUS_SUMIFS
mes.col.10.baseFormula={col:PDCL}
mes.col.10.from=Deuda
mes.col.10.sum=Horas
mes.col.10.match=Peticion:Petición,Matricula:Matrícula,Funcion:Funcion
mes.col.10.fill=LIGHT_GREEN
mes.col.10.redIfNotEqualTo=PDCL

# --- Lookups ---
lookup.sheets=Equipos

lookup.Equipos.header1=App
lookup.Equipos.header2=Equipo
lookup.Equipos.hidden=false
lookup.Equipos.data=DF:Iker,HE:Jon,EW:JAVA,J6:Iker,JX:JAVA,HW:Argia,PE:Personal,WH:Iker,PF:Jon,KE:Argia

# --- Derivadas (vacio por defecto; tests que las necesiten montan su propio config) ---
derived.sheets=

# --- Validacion ---
config.strictValidation=true

# --- Hoja Resumen (v1.6.0) ---
summary.enabled=true
summary.sheetName=Resumen
summary.sumSheet=Resultado
summary.matriculaColumn=Matrícula
summary.valueColumns=Jira,REAL,PDCL,PDCL + Deuda
summary.sumifsMaxRow=10000

# --- Segunda tabla en Resumen (v1.8.0) ---
# Habilitada en tests para que la ruta de integracion completa
# (pipeline + FormulaEvaluator) cubra la matriz Matricula x Responsable.
summary.byResponsible.enabled=true
summary.byResponsible.column=Res. Tecnico
summary.byResponsible.valueColumn=PDCL
summary.byResponsible.title=Totales Peticiones por Responsables Matrículas
summary.byResponsible.gapRows=2

# --- Huerfanos (v1.7.0) ---
# Disabled por defecto: los tests existentes asumen el comportamiento
# v1.6.2 (sin huerfanos, orden natural de Extraccion). El test especifico
# de huerfanos (orphansEnabledProduceFilasHuerfanasOrdenadas) renderiza
# su propio config con enabled=true.
mes.orphans.enabled=false
mes.orphans.sourceSheet=Extraccion
mes.orphans.matchComponent=Component Name
mes.orphans.matchMatricula=Matricula
mes.orphans.sumColumn=Hours
mes.orphans.colPeticion=Petición
mes.orphans.colMatricula=Matrícula
mes.orphans.colJira=Jira
